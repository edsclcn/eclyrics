<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/prompter.css">
</head>
<body>
    <div class="prompterCon" id="bgPrompter">
        <div id="prompter-content"></div>

        <div class="card md" id="helpCard" aria-hidden="true">
            <div class="card-body p-5">
                <h5>Prompter controls</h5>
                <p class="prompter-help-lede">Hold <kbd>Tab</kbd> on this window. Keys are sent from the main app — same list as the preview shortcuts.</p>
                <hr>
                <div class="px-3">
                    <table>
                        <thead>
                            <tr><th>Key</th><th>Function</th></tr>
                        </thead>
                        <tbody id="prompter-help-table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script defer src="js/prompter-shortcuts.js"></script>
    <script defer src="js/prompter-sync-guard.js"></script>
    <script defer src="js/prompter.js"></script>
</body>
</html>
