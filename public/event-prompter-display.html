<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <title>Event Prompter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Tahoma', Geneva, sans-serif; background: #000; color: #fff; min-height: 100vh; overflow-x: hidden; }
    #ep-content { padding: 1.5rem; max-width: 800px; margin: 0 auto; font-size: 12pt; font-weight: bold; line-height: 1.0; }
    .ep-block-title { color: #0070C0; font-size: 18pt; font-weight: bold; margin-bottom: 0.5rem; }
    .ep-block-take { background: #FFC000; color: #000; font-weight: bold; padding: 4px 8px; margin: 0.25rem 0; }
    .ep-block-section { background: #D9F2D0; color: #0070C0; font-weight: bold; padding: 4px 8px; }
    .ep-block-subitem { color: #fff; font-size: 12pt; font-weight: bold; padding-left: 12px; margin: 2px 0; }
    .ep-block-notes { color: #595959; font-style: italic; padding-left: 12px; margin: 2px 0; }
    .ep-block-oncam { color: #0070C0; font-weight: bold; padding-left: 12px; margin: 2px 0; }
    .ep-block-back { color: #EE0000; font-weight: bold; padding-left: 12px; margin: 2px 0; }
    .ep-block-end { background: #002060; color: #fff; font-weight: bold; padding: 12px; text-align: center; margin-top: 1rem; }
  </style>
</head>
<body>
  <div id="ep-content"></div>
  <script>
    (function() {
      const params = new URLSearchParams(location.search);
      const key = params.get('key');
      if (!key) {
        document.getElementById('ep-content').innerHTML = '<p style="color:#888;padding:2rem;">No prompter data. Open from Event Prompter and click Send to Prompter.</p>';
        return;
      }
      try {
        const html = localStorage.getItem(key);
        if (html) {
          document.getElementById('ep-content').innerHTML = html;
          document.title = params.get('title') || 'Event Prompter';
        } else {
          document.getElementById('ep-content').innerHTML = '<p style="color:#888;">Session expired. Reopen from Event Prompter.</p>';
        }
      } catch (e) {
        document.getElementById('ep-content').innerHTML = '<p style="color:#c00;">Failed to load prompter.</p>';
      }
    })();
  </script>
</body>
</html>
