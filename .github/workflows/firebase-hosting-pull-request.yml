# Firebase Hosting preview deploy for pull requests.
# https://firebase.google.com/docs/hosting/github-integration

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write

# Avoid overlapping deploys to the same PR channel (causes "current active version" errors).
concurrency:
  group: firebase-hosting-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Firebase credentials
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ECLYRICS_E8D68 }}
        run: |
          SA_PATH="${RUNNER_TEMP}/firebase_sa.json"
          node -e "
            const fs = require('fs');
            const path = process.argv[1];
            fs.writeFileSync(path, process.env.FIREBASE_SA);
            const json = JSON.parse(fs.readFileSync(path, 'utf8'));
            if (!json.client_email || !json.private_key) {
              throw new Error('Service account secret is missing client_email or private_key');
            }
            console.log('Authenticated as', json.client_email);
          " "$SA_PATH"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$SA_PATH" >> "$GITHUB_ENV"
          echo "FIREBASE_DEPLOY_AGENT=action-hosting-deploy" >> "$GITHUB_ENV"

      - name: Deploy to Firebase Hosting preview channel
        id: deploy
        run: |
          CHANNEL_ID="pr${{ github.event.pull_request.number }}"
          DEPLOY_LOG="${RUNNER_TEMP}/hosting-deploy.log"
          DEPLOY_JSON="${RUNNER_TEMP}/hosting-deploy.json"

          set +e
          npx --yes firebase-tools@latest hosting:channel:deploy "$CHANNEL_ID" \
            --expires 7d \
            --project eclyrics-e8d68 \
            --non-interactive \
            --json 2>"$DEPLOY_LOG" | tee "$DEPLOY_JSON"
          CODE=${PIPESTATUS[0]}

          if [ "$CODE" -ne 0 ]; then
            if grep -qE "is the current active version|Channel .+ already exists" "$DEPLOY_LOG" "$DEPLOY_JSON" 2>/dev/null; then
              echo "::warning::Preview channel is already live — treating deploy as success."
              CODE=0
            else
              cat "$DEPLOY_LOG" >&2
              [ -s "$DEPLOY_JSON" ] && cat "$DEPLOY_JSON" >&2
              exit "$CODE"
            fi
          fi

          PREVIEW_URL=""
          if [ -s "$DEPLOY_JSON" ]; then
            PREVIEW_URL=$(node -e "
              const fs = require('fs');
              const raw = fs.readFileSync(process.argv[1], 'utf8').trim();
              try {
                const data = JSON.parse(raw);
                if (data.status === 'success' && data.result) {
                  const sites = Object.values(data.result);
                  if (sites[0]?.url) process.stdout.write(sites[0].url);
                }
              } catch (_) { /* fall through */ }
            " "$DEPLOY_JSON")
          fi

          if [ -z "$PREVIEW_URL" ]; then
            PREVIEW_URL=$(npx --yes firebase-tools@latest hosting:channel:list \
              --site eclyrics \
              --project eclyrics-e8d68 \
              --json 2>/dev/null | node -e "
                const id = process.argv[1];
                const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
                const channels = data.result?.channels ?? data.channels ?? [];
                const ch = channels.find((c) => (c.name || '').endsWith('/channels/' + id));
                if (ch?.url) process.stdout.write(ch.url);
              " "$CHANNEL_ID")
          fi

          if [ -z "$PREVIEW_URL" ]; then
            echo "::error::Deploy finished but preview URL could not be resolved."
            exit 1
          fi

          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $PREVIEW_URL"

      - name: Comment preview URL on pull request
        if: steps.deploy.outputs.preview_url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${{ steps.deploy.outputs.preview_url }}`;
            const body = [
              '🚀 **Firebase Hosting preview ready**',
              '',
              url,
              '',
              '*(Preview channel expires in 7 days.)*',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = 'Firebase Hosting preview ready';
            const existing = comments.find(
              (c) => c.user?.type === 'Bot' && c.body?.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
