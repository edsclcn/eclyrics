# Firebase Hosting preview deploy for pull requests.
# https://firebase.google.com/docs/hosting/github-integration

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write

# Avoid overlapping deploys to the same PR channel (causes "current active version" errors).
concurrency:
  group: firebase-hosting-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting preview channel
        id: firebase
        continue-on-error: true
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ECLYRICS_E8D68 }}
          projectId: eclyrics-e8d68
          firebaseToolsVersion: 13.29.1
          channelId: pr${{ github.event.pull_request.number }}
          expires: 7d

      - name: Resolve preview URL
        id: preview
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ECLYRICS_E8D68 }}
        run: |
          if [ -n "${{ steps.firebase.outputs.details_url }}" ]; then
            echo "url=${{ steps.firebase.outputs.details_url }}" >> "$GITHUB_OUTPUT"
            echo "Preview URL (from deploy): ${{ steps.firebase.outputs.details_url }}"
            exit 0
          fi

          # firebase-tools may fail the release step when a retry hits "already active version"
          # even though the channel is live. Look up the channel URL directly.
          SA_PATH="${RUNNER_TEMP}/firebase_sa.json"
          node -e "
            const fs = require('fs');
            const path = process.argv[1];
            fs.writeFileSync(path, process.env.FIREBASE_SA);
            const json = JSON.parse(fs.readFileSync(path, 'utf8'));
            if (!json.client_email || !json.private_key) {
              throw new Error('Service account secret is missing client_email or private_key');
            }
            console.log('Authenticated as', json.client_email);
          " "$SA_PATH"
          export GOOGLE_APPLICATION_CREDENTIALS="$SA_PATH"
          export FIREBASE_DEPLOY_AGENT=action-hosting-deploy

          CHANNEL_ID="pr${{ github.event.pull_request.number }}"
          URL=$(npx --yes firebase-tools@13.29.1 hosting:channel:list \
            --site eclyrics \
            --project eclyrics-e8d68 \
            --json 2>/dev/null | node -e "
              const id = process.argv[1];
              const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
              const channels = data.result?.channels ?? data.channels ?? [];
              const ch = channels.find((c) => (c.name || '').endsWith('/channels/' + id));
              if (ch?.url) process.stdout.write(ch.url);
            " "$CHANNEL_ID")

          if [ -z "$URL" ]; then
            echo "::error::Preview deploy failed and channel URL could not be resolved."
            exit 1
          fi

          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL (from channel list): $URL"

      - name: Comment preview URL on pull request
        if: steps.preview.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${{ steps.preview.outputs.url }}`;
            const body = [
              '🚀 **Firebase Hosting preview ready**',
              '',
              url,
              '',
              '*(Preview channel expires in 7 days.)*',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = 'Firebase Hosting preview ready';
            const existing = comments.find(
              (c) => c.user?.type === 'Bot' && c.body?.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
