# Firebase Hosting preview deploy for pull requests.
# https://firebase.google.com/docs/hosting/github-integration

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write

# Avoid overlapping deploys to the same PR channel (causes "current active version" errors).
concurrency:
  group: firebase-hosting-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting preview channel
        id: deploy
        run: |
          npm install -g firebase-tools@13.29.1
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ECLYRICS_E8D68 }}' > "${RUNNER_TEMP}/firebase_sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="${RUNNER_TEMP}/firebase_sa.json"

          if [ ! -s "${RUNNER_TEMP}/firebase_sa.json" ]; then
            echo "::error::Firebase service account secret is missing or empty."
            exit 1
          fi

          CHANNEL_ID="pr${{ github.event.pull_request.number }}"
          DEPLOY_LOG="${RUNNER_TEMP}/hosting-deploy.log"

          set +e
          firebase hosting:channel:deploy "$CHANNEL_ID" \
            --expires 7d \
            --project eclyrics-e8d68 \
            --non-interactive 2>&1 | tee "$DEPLOY_LOG"
          CODE=${PIPESTATUS[0]}

          if [ "$CODE" -ne 0 ] && grep -q "is the current active version" "$DEPLOY_LOG"; then
            echo "::warning::Preview channel already serves this version — treating deploy as success."
            CODE=0
          fi

          PREVIEW_URL=""
          if [ "$CODE" -eq 0 ]; then
            PREVIEW_URL=$(firebase hosting:channel:list --site eclyrics --project eclyrics-e8d68 --json \
              | node -e "
                const id = process.argv[1];
                const raw = require('fs').readFileSync(0, 'utf8');
                const data = JSON.parse(raw);
                const channels = data.result?.channels ?? data.channels ?? [];
                const ch = channels.find((c) => (c.name || '').endsWith('/channels/' + id));
                if (ch?.url) process.stdout.write(ch.url);
              " "$CHANNEL_ID")
          fi

          rm -f "${RUNNER_TEMP}/firebase_sa.json"

          if [ "$CODE" -ne 0 ]; then
            exit "$CODE"
          fi
          if [ -z "$PREVIEW_URL" ]; then
            echo "::error::Deploy succeeded but preview URL could not be resolved."
            exit 1
          fi

          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $PREVIEW_URL"

      - name: Comment preview URL on pull request
        if: steps.deploy.outputs.preview_url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${{ steps.deploy.outputs.preview_url }}`;
            const body = [
              '🚀 **Firebase Hosting preview ready**',
              '',
              url,
              '',
              '*(Preview channel expires in 7 days.)*',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = 'Firebase Hosting preview ready';
            const existing = comments.find(
              (c) => c.user?.type === 'Bot' && c.body?.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
