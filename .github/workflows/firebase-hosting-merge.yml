name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - name: Deploy Firestore rules
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ECLYRICS_E8D68 }}
        run: |
          SA_PATH="${RUNNER_TEMP}/firebase_sa.json"
          node -e "require('fs').writeFileSync(process.argv[1], process.env.FIREBASE_SA)" "$SA_PATH"
          export GOOGLE_APPLICATION_CREDENTIALS="$SA_PATH"
          export FIREBASE_DEPLOY_AGENT=action-hosting-deploy
          npx --yes firebase-tools@latest deploy --only firestore:rules --project eclyrics-e8d68 --non-interactive
          rm -f "$SA_PATH"
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ECLYRICS_E8D68 }}
          channelId: live
          projectId: eclyrics-e8d68
