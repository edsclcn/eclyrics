name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - name: Deploy Firestore rules
        run: |
          npm install -g firebase-tools@13
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ECLYRICS_E8D68 }}' > "${RUNNER_TEMP}/firebase_sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="${RUNNER_TEMP}/firebase_sa.json"
          firebase deploy --only firestore:rules --project eclyrics-e8d68 --non-interactive
          rm -f "${RUNNER_TEMP}/firebase_sa.json"
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ECLYRICS_E8D68 }}
          channelId: live
          projectId: eclyrics-e8d68
